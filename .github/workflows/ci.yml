name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build + Lint (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        # Windows runners default to PowerShell; Bash is needed for the CI guard
        # script in release.yml and is consistent across OSes here too.
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # --ignore-scripts skips native module builds (notably `isolated-vm`,
      # a transitive devDep of @n8n/node-cli via @n8n/ai-node-sdk). Those
      # native builds are not needed for our `tsc` build or ESLint lint;
      # they exist for n8n's AI sandbox runtime, which we don't exercise
      # here. Without --ignore-scripts, `isolated-vm` fails to compile
      # against newer V8 headers shipped in Node 20.20.2 / 22.x runners.
      - run: npm ci --ignore-scripts

      - run: npm run lint

      - run: npm run build
