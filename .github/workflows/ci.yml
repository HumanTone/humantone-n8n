name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build + Lint (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        # Windows runners default to PowerShell; Bash is needed for the CI guard
        # script in release.yml and is consistent across OSes here too.
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build
